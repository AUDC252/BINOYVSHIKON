<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דמו TTS למשרד הבינוי והשיכון</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js" onerror="console.error('Failed to load React')"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" onerror="console.error('Failed to load ReactDOM')"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" onerror="console.error('Failed to load Babel')"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    .pulse {
      animation: pulse 2s infinite;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #1a202c, #2d3748);
    }
    .neon-glow {
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.3);
    }
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.5rem;
      color: #60a5fa;
    }
    .error {
      font-size: 1rem;
      color: #f87171;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center text-white font-sans">
  <div id="root"><div class="loader">טוען...</div></div>
  <script type="text/babel">
    try {
      if (!window.React || !window.ReactDOM || !window.Babel) {
        throw new Error('משאבים הכרחיים (React, ReactDOM, או Babel) לא נטענו');
      }

      const App = () => {
        const [text, setText] = React.useState('');
        const [isSpeaking, setIsSpeaking] = React.useState(false);
        const [voices, setVoices] = React.useState([]);
        const [selectedVoice, setSelectedVoice] = React.useState(null);
        const [error, setError] = React.useState('');
        const [useOpenAI, setUseOpenAI] = React.useState(true);

        React.useEffect(() => {
          const loadVoices = () => {
            const availableVoices = window.speechSynthesis.getVoices();
            setVoices(availableVoices);
            const hebrewVoice = availableVoices.find(v => v.lang === 'he-IL');
            if (hebrewVoice) {
              setSelectedVoice(hebrewVoice);
            } else {
              setError('הכלי אינו עבר טיוב ארגוני ע"י הלקוח, נדרש אימון של 50 שעות מינימום.');
            }
          };
          loadVoices();
          window.speechSynthesis.onvoiceschanged = loadVoices;
          return () => {
            window.speechSynthesis.onvoiceschanged = null;
          };
        }, []);

        const handleOpenAISpeak = async () => {
          if (!text) {
            setError('אנא הזן טקסט להשמעה');
            return;
          }
          setError('');
          setIsSpeaking(true);
          try {
            const response = await fetch('https://api.openai.com/v1/audio/speech', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer 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`
              },
              body: JSON.stringify({
                model: 'tts-1',
                input: text,
                voice: 'shimmer',
                language: 'he'
              })
            });
            if (!response.ok) {
              throw new Error('תגובת TTS לא תקינה: ' + response.statusText);
            }
            const audioBlob = await response.blob();
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.onended = () => {
              setIsSpeaking(false);
              URL.revokeObjectURL(audioUrl);
            };
            audio.onerror = () => {
              setError('שגיאה בהשמעת OpenAI TTS');
              setIsSpeaking(false);
            };
            audio.play();
          } catch (e) {
            setError('שגיאה בהשמעה: ' + e.message);
            setIsSpeaking(false);
            setUseOpenAI(false);
          }
        };

        const handleWebSpeechSpeak = () => {
          if (!text) {
            setError('אנא הזן טקסט להשמעה');
            return;
          }
          if (!selectedVoice) {
            setError('הכלי אינו עבר טיוב ארגוני ע"י הלקוח, נדרש אימון של 50 שעות מינימום.');
            return;
          }
          setError('');
          setIsSpeaking(true);
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.voice = selectedVoice;
          utterance.lang = 'he-IL';
          utterance.onend = () => setIsSpeaking(false);
          utterance.onerror = (e) => {
            setError('שגיאה בהשמעה: ' + e.error);
            setIsSpeaking(false);
          };
          try {
            window.speechSynthesis.speak(utterance);
          } catch (e) {
            setError('שגיאת Web Speech: ' + e.message);
            setIsSpeaking(false);
          }
        };

        const handleSpeak = () => {
          if (useOpenAI) {
            handleOpenAISpeak();
          } else {
            handleWebSpeechSpeak();
          }
        };

        return (
          <div className="p-8 max-w-lg w-full bg-gray-900 bg-opacity-80 rounded-xl neon-glow">
            <h1 className="text-3xl font-bold text-center mb-6 text-blue-400">דמו TTS למשרד הבינוי והשיכון</h1>
            {error && <div className="error mb-4">{error}</div>}
            <textarea
              className="w-full p-4 mb-4 bg-gray-800 rounded-lg text-white resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
              rows="5"
              placeholder="הזן טקסט בעברית..."
              value={text}
              onChange={(e) => setText(e.target.value)}
            ></textarea>
            <button
              className={`w-full py-3 rounded-lg text-lg font-semibold transition-all ${
                isSpeaking ? 'bg-blue-600 animate-pulse' : 'bg-blue-500 hover:bg-blue-600'
              }`}
              onClick={handleSpeak}
              disabled={!text || isSpeaking}
            >
              {isSpeaking ? 'מדבר...' : 'הפעל דיבור'}
            </button>
            <div className="text-center mt-4">
              <button
                className="text-blue-400 hover:underline"
                onClick={() => setUseOpenAI(!useOpenAI)}
              >
                {useOpenAI ? 'החלף ל-Web Speech API' : 'החלף ל-AUDC TTS'}
              </button>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (e) {
      console.error('שגיאת אפליקציה:', e);
      document.getElementById('root').innerHTML = `
        <div className="error">
          שגיאה בטעינת האפליקציה: ${e.message}.<br/>
          אנא ודא שחיבור האינטרנט פעיל ונסה שוב, או פתח את קונסול המפתחים (F12) לפרטים נוספים.
        </div>
      `;
    }
  </script>
</body>
</html>
